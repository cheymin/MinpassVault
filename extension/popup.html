<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e4e4e7;
    }
    
    .container {
      padding: 16px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 600;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: rgba(255,255,255,0.2);
      color: #e4e4e7;
    }
    
    .lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      text-align: center;
    }
    
    .lock-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
    }
    
    .lock-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .lock-subtitle {
      color: #a1a1aa;
      margin-bottom: 24px;
    }
    
    .input-group {
      width: 100%;
      max-width: 280px;
      margin-bottom: 16px;
    }
    
    .input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #e4e4e7;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .input:focus {
      border-color: #6366f1;
      background: rgba(255,255,255,0.1);
    }
    
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 8px;
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      padding: 4px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .tab {
      flex: 1;
      padding: 8px 12px;
      border: none;
      background: transparent;
      color: #a1a1aa;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: rgba(255,255,255,0.1);
      color: #e4e4e7;
    }
    
    .search-box {
      position: relative;
      margin-bottom: 12px;
    }
    
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #e4e4e7;
      font-size: 13px;
      outline: none;
    }
    
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #a1a1aa;
    }
    
    .item-list {
      max-height: 320px;
      overflow-y: auto;
    }
    
    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .item:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .item-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
    }
    
    .item-info {
      flex: 1;
      min-width: 0;
    }
    
    .item-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .item-username {
      font-size: 12px;
      color: #a1a1aa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .item-actions {
      display: flex;
      gap: 4px;
    }
    
    .item-action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }
    
    .item-action-btn:hover {
      background: rgba(255,255,255,0.2);
      color: #e4e4e7;
    }
    
    .totp-section {
      margin-bottom: 16px;
    }
    
    .totp-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .totp-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: white;
    }
    
    .totp-info {
      flex: 1;
    }
    
    .totp-name {
      font-size: 14px;
      font-weight: 500;
    }
    
    .totp-code {
      font-size: 24px;
      font-weight: 600;
      font-family: 'Courier New', monospace;
      letter-spacing: 4px;
      color: #10b981;
    }
    
    .totp-timer {
      width: 36px;
      height: 36px;
      position: relative;
    }
    
    .totp-timer svg {
      transform: rotate(-90deg);
    }
    
    .totp-timer circle {
      fill: none;
      stroke-width: 3;
    }
    
    .totp-timer .bg {
      stroke: rgba(255,255,255,0.1);
    }
    
    .totp-timer .progress {
      stroke: #10b981;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #a1a1aa;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .hidden {
      display: none !important;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="lockScreen" class="lock-screen">
      <div class="lock-icon">🔐</div>
      <h2 class="lock-title">SecureVault</h2>
      <p class="lock-subtitle">请输入主密码解锁</p>
      <div class="input-group">
        <input type="password" id="masterPassword" class="input" placeholder="主密码" autofocus>
      </div>
      <button id="unlockBtn" class="btn btn-primary">解锁</button>
      <p id="lockError" class="error-msg hidden"></p>
    </div>
    
    <div id="mainContent" class="hidden">
      <div class="header">
        <div class="logo">
          <div class="logo-icon">🔐</div>
          <span class="logo-text">SecureVault</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="syncBtn" title="同步">🔄</button>
          <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
          <button class="icon-btn" id="lockBtn" title="锁定">🔒</button>
        </div>
      </div>
      
      <div class="tabs">
        <button class="tab active" data-tab="passwords">密码</button>
        <button class="tab" data-tab="totp">验证器</button>
      </div>
      
      <div id="passwordsTab">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索密码...">
        </div>
        <div id="passwordList" class="item-list"></div>
      </div>
      
      <div id="totpTab" class="hidden">
        <div id="totpList" class="totp-section"></div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
