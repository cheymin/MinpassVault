<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVault 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e4e4e7;
      min-height: 100vh;
      padding: 24px;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .section {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    label {
      display: block;
      font-size: 13px;
      color: #a1a1aa;
      margin-bottom: 6px;
    }
    
    .input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #e4e4e7;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }
    
    .input:focus {
      border-color: #6366f1;
      background: rgba(255,255,255,0.1);
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e4e4e7;
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .btn-danger:hover {
      background: #dc2626;
    }
    
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .totp-list {
      margin-top: 12px;
    }
    
    .totp-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .totp-info {
      flex: 1;
    }
    
    .totp-name {
      font-weight: 500;
    }
    
    .totp-secret {
      font-size: 12px;
      color: #a1a1aa;
      font-family: monospace;
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
    }
    
    .message.success {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    
    .message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .checkbox-group input {
      width: 18px;
      height: 18px;
    }
    
    .checkbox-group label {
      margin-bottom: 0;
      color: #e4e4e7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-icon">🔐</div>
      <h1>SecureVault 设置</h1>
    </div>
    
    <div class="section">
      <h2 class="section-title">🔒 安全设置</h2>
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="currentPassword" class="input" placeholder="输入当前密码">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" class="input" placeholder="输入新密码">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPassword" class="input" placeholder="再次输入新密码">
      </div>
      <div class="btn-group">
        <button id="changePasswordBtn" class="btn btn-primary">修改密码</button>
      </div>
    </div>
    
    <div class="section">
      <h2 class="section-title">☁️ WebDAV 同步</h2>
      <div class="form-group">
        <label>WebDAV 地址</label>
        <input type="text" id="webdavUrl" class="input" placeholder="https://your-webdav-server.com/dav/">
      </div>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="webdavUsername" class="input" placeholder="WebDAV 用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="webdavPassword" class="input" placeholder="WebDAV 密码">
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="autoSync">
        <label for="autoSync">自动同步（每小时）</label>
      </div>
      <div class="btn-group">
        <button id="testWebdavBtn" class="btn btn-secondary">测试连接</button>
        <button id="saveWebdavBtn" class="btn btn-primary">保存配置</button>
        <button id="syncNowBtn" class="btn btn-secondary">立即同步</button>
      </div>
    </div>
    
    <div class="section">
      <h2 class="section-title">📱 两步验证器</h2>
      <div class="form-group">
        <label>添加验证器</label>
        <input type="text" id="totpName" class="input" placeholder="名称（如：Google）" style="margin-bottom: 8px;">
        <input type="text" id="totpSecret" class="input" placeholder="密钥（Base32编码）">
      </div>
      <div class="btn-group">
        <button id="addTotpBtn" class="btn btn-primary">添加</button>
      </div>
      <div id="totpList" class="totp-list"></div>
    </div>
    
    <div id="message" class="message hidden"></div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
